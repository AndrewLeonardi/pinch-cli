name: Bug Report
description: Report a bug in Pinch CLI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what happened
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pinch CLI version
      description: "Run `pinch --version` to find this"
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Run `node --version` to find this"
      placeholder: "v20.11.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pinch init my-tool`
        2. Select "Hello World" template
        3. Run `pinch dev`
        4. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant terminal output
      render: shell
    validations:
      required: false
